<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmos Weather</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop stop-color='%2338bdf8'/%3E%3Cstop offset='1' stop-color='%23fb7185'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='%230f172a'/%3E%3Ccircle cx='24' cy='24' r='11' fill='url(%23g)'/%3E%3Cpath d='M20 42c0-5 4-9 9-9 1 0 3 0 4 1 2-4 6-6 10-6 7 0 13 5 13 12s-6 12-13 12H29c-5 0-9-4-9-10Z' fill='%23f8fafc' fill-opacity='.92'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <div class="aurora aurora-one"></div>
        <div class="aurora aurora-two"></div>

        <main class="app-card">
            <section class="hero-panel">
                <p class="eyebrow">Live conditions</p>
                <h1>Atmos</h1>
                <p class="hero-copy">
                    A calm, modern weather dashboard for checking the sky before you step outside.
                </p>

                <form class="search-bar" id="weather-form">
                    <label class="sr-only" for="city-input">Search city</label>
                    <input type="text" id="city-input" placeholder="Search a city..." autocomplete="off">
                    <button type="submit">Check weather</button>
                </form>

                <div class="search-hint">
                    Try: London, Mumbai, Tokyo, New York
                </div>
            </section>

            <section class="weather-panel" id="result" aria-live="polite">
                <div class="status-card">
                    <p class="status-label">Weather waiting</p>
                    <h2>Search for a city</h2>
                    <p class="status-copy">
                        Current temperature, local time, wind, humidity, and conditions will appear here.
                    </p>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
